<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mapa Nacional</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">

<link rel="stylesheet" href="css/global.css">
<link rel="stylesheet" href="css/header.css">
<link rel="stylesheet" href="css/mapa.css">
<link rel="stylesheet" href="css/footer.css">

</head>

<body>

<header class="topbar">

<div class="logo">🌿 Biofábricas CR</div>

<nav class="main-nav">
<a href="index.html">Inicio</a>
<a href="mapa.html">Mapa</a>
<a href="recursos.html">Recursos</a>
</nav>

</header>

<main>

<section class="map-dashboard">

<aside class="filter-panel">

<h3>Buscar y filtrar</h3>

<input id="searchBox" placeholder="Buscar biofábrica">

<select id="provinciaFilter">
<option>Todas las provincias</option>
<option>San José</option>
<option>Alajuela</option>
<option>Cartago</option>
<option>Heredia</option>
<option>Limón</option>
<option>Puntarenas</option>
<option>Guanacaste</option>
</select>

<select id="estadoFilter">
<option>Todos los estados</option>
<option>Activa</option>
<option>En construcción</option>
<option>Futura</option>
</select>

<select id="tipoFilter">
<option>Todos los tipos</option>
<option>Compostaje</option>
<option>Biofertilizantes</option>
<option>Mixta</option>
</select>

<div class="toolbar-buttons">
<button id="searchBtn">Buscar</button>
<button id="resetBtn">Limpiar</button>
</div>

</aside>

<div class="map-container">

<div class="section-head">
<h2>Mapa Nacional</h2>
</div>

<div id="map"></div>

</div>

<aside id="infoPanel" class="bio-card">

<img src="assets/images/hero.png">

<div class="card-content">

<h3>Información de Biofábrica</h3>

<div class="help-box">
Seleccione una biofábrica.
</div>

</div>

</aside>

</section>

</main>

<footer>
<p>Biofábricas Costa Rica</p>
</footer>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script src="js/data.js"></script>
<script src="js/mapa.js"></script>

</body>
</html>
